<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia - Team D2X</title>
    <link rel="stylesheet" href="/css/pages/company/team/team.css">
</head>
<body>
    
    <nav class="navbar">
        <div class="navbar__inner-wrapper">
            <div class="navbar__logo">
                <a href="/">
                    <img src="/assets/global/logo_white.svg" alt="">
                </a>
            </div>
            <div class="navbar__links">
                <div class="link active">
                    <a href="/">Home</a>
                </div>
                <div class="link">
                    <a href="#">Team</a>
                </div>
                <div class="divider"></div>
            </div>
        </div>
    </nav>

    <div id="content">

        <section id="hero" class="hero hero--half-height">
            <img class="hero__bg-image" src="/assets/pages/company/team/hero.webp" alt="Anime themed world">
            <div class="hero__bg-mask"></div>
            <div class="hero__wrapper">
                <div class="hero-text hero-text--white hero-text--center">
                    <h1 class="hero-text__headline">Creators of Arcadia, Team Double Dragon</h1>
                    <p>Discover and learn about the company dedicated to creating the ultimate anime platform</p>
                </div>
            </div>
        </section>

        <section id="leadership" class="section">
            <div class="section__wrapper">
                <div class="section-main section-main--center">
                    <h2 class="section-main__title">Leadership</h2>
                </div>
                <div class="section-content member-list">
                </div>
            </div>
        </section>

        <section id="app-leaders" class="section">
            <div class="section__wrapper">
                <div class="section-main section-main--center">
                    <h2 class="section-main__title">App Leads</h2>
                </div>
                <div class="section-content member-list member-list--white">
                </div>
            </div>
        </section>

        <section id="developers" class="section">
            <div class="section__wrapper">
                <div class="section-main section-main--center">
                    <h2 class="section-main__title">Developers</h2>
                </div>
                <div class="section-content member-list">
                </div>
            </div>
        </section>

        <section id="finance" class="section">
            <div class="section__wrapper">
                <div class="section-main section-main--center">
                    <h2 class="section-main__title">Finance</h2>
                </div>
                <div class="section-content member-list member-list--white">
                </div>
            </div>
        </section>

        <section id="r-and-d" class="section">
            <div class="section__wrapper">
                <div class="section-main section-main--center">
                    <h2 class="section-main__title">Research & Development</h2>
                </div>
                <div class="section-content member-list">
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">

    </footer>
    
    <script src="/js/members.js"></script>
</body>
</html>
